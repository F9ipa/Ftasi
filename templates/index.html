<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASI Tracker Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .status { font-size: 11px; color: #94a3b8; margin-bottom: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: #1e293b; padding: 12px; font-size: 12px; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #0f172a; text-align: center; font-size: 14px; }
        .up { color: #4ade80; } .down { color: #f87171; }
        #loading { text-align: center; padding: 20px; color: var(--accent); }
    </style>
</head>
<body>

<div style="text-align:center; padding:10px;">
    <h3 style="margin:0; color:var(--accent)">مراقب السوق السعودي الكامل</h3>
    <div class="status" id="lastUpdate">جاري جلب 269 شركة...</div>
</div>

<input type="text" id="search" onkeyup="renderTable()" placeholder="ابحث بالرمز أو السعر..." class="search-box">

<div id="loading">انتظر قليلاً، يتم الآن معالجة بيانات تاسي...</div>

<table id="stockTable" style="display:none;">
    <thead>
        <tr>
            <th>الرمز</th>
            <th>السعر</th>
            <th>التغير</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    let allStocks = [];

    async function fetchData() {
        try {
            const response = await fetch('/api/data');
            allStocks = await response.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stockTable').style.display = 'table';
            document.getElementById('lastUpdate').innerText = `تم تحديث ${allStocks.length} شركة بنجاح`;
            renderTable();
        } catch (e) {
            document.getElementById('loading').innerText = "خطأ في الاتصال بالسيرفر";
        }
    }

    function renderTable() {
        const query = document.getElementById('search').value.toUpperCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        const filtered = allStocks.filter(s => s.s.includes(query));

        filtered.forEach(stock => {
            const row = `<tr>
                <td style="color:var(--accent); font-weight:bold;">${stock.s}</td>
                <td>${stock.p}</td>
                <td class="${stock.c >= 0 ? 'up' : 'down'}">
                    ${stock.c > 0 ? '+' : ''}${stock.c} (${stock.pc}%)
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    fetchData();
</script>
</body>
</html>
