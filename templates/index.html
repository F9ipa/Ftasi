<!DOCTYPE html>
<html>
<head>
    <title>تاسي - فلتر WaveTrend</title>
    <style>
        body { font-family: Arial; direction: rtl; text-align: center; background: #f4f4f4; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background: #333; color: white; }
        .buy { color: green; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>نتائج فلتر WaveTrend للسوق السعودي</h2>
    <table>
        <tr>
            <th>الرمز</th>
            <th>WT1</th>
            <th>WT2</th>
            <th>الإشارة</th>
        </tr>
        {% for stock in stocks %}
        <tr>
            <td>{{ stock.symbol }}</td>
            <td>{{ stock.wt1 }}</td>
            <td>{{ stock.wt2 }}</td>
            <td class="{{ 'buy' if 'Buy' in stock.signal else 'sell' if 'Sell' in stock.signal else '' }}">
                {{ stock.signal }}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
